<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSL Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #0f1629;
    --surface2: #151d35;
    --border: #1e2d4d;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --orange: #f97316;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,212,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 80%, rgba(124,58,237,0.06) 0%, transparent 50%);
  }

  header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .logo span { color: var(--text-dim); font-weight: 300; }

  .tagline {
    font-size: 0.75rem;
    color: var(--text-dim);
    border-left: 1px solid var(--border);
    padding-left: 1rem;
  }

  main { max-width: 960px; margin: 0 auto; padding: 2rem; }

  .scan-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem;
    margin-bottom: 2rem;
  }

  .scan-box h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }
  .scan-box p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 1.25rem; }

  .input-row {
    display: flex;
    gap: 0.75rem;
    align-items: stretch;
    flex-wrap: wrap;
  }

  .input-host {
    flex: 1;
    min-width: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-host:focus { border-color: var(--accent); }
  .input-host::placeholder { color: var(--text-dim); }

  .input-port {
    width: 90px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.75rem;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-port:focus { border-color: var(--accent); }

  .btn-scan {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 0 1.5rem;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-scan:hover { opacity: 0.85; }
  .btn-scan:active { transform: scale(0.98); }
  .btn-scan:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Progress */
  .progress-container { display: none; margin-top: 1rem; }
  .progress-label {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 0.4rem;
  }
  .progress-bar-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Résultats */
  #results { display: none; }

  .grade-banner {
    display: flex;
    align-items: center;
    gap: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem 2rem;
    margin-bottom: 1.5rem;
  }

  .grade-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
    border: 3px solid;
  }

  .grade-A-plus { color: #10b981; border-color: #10b981; background: rgba(16,185,129,0.1); }
  .grade-A      { color: #10b981; border-color: #10b981; background: rgba(16,185,129,0.1); }
  .grade-B      { color: #06b6d4; border-color: #06b6d4; background: rgba(6,182,212,0.1); }
  .grade-C      { color: #f59e0b; border-color: #f59e0b; background: rgba(245,158,11,0.1); }
  .grade-D      { color: #f97316; border-color: #f97316; background: rgba(249,115,22,0.1); }
  .grade-E      { color: #ef4444; border-color: #ef4444; background: rgba(239,68,68,0.1); }
  .grade-F      { color: #ef4444; border-color: #ef4444; background: rgba(239,68,68,0.1); }
  .grade-NA     { color: #64748b; border-color: #64748b; background: rgba(100,116,139,0.1); }

  .grade-info { flex: 1; }
  .grade-info h2 {
    font-size: 1.2rem; font-weight: 600; margin-bottom: 0.3rem;
    font-family: 'JetBrains Mono', monospace;
  }
  .grade-meta {
    font-size: 0.8rem; color: var(--text-dim); display: flex; gap: 1.5rem; flex-wrap: wrap;
  }
  .grade-meta span { display: flex; align-items: center; gap: 0.3rem; }

  .score-bar-track {
    margin-top: 0.75rem;
    height: 6px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    max-width: 300px;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1);
  }

  /* Grid de cartes */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
  }

  .card-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 12px;
    background: var(--accent);
    border-radius: 2px;
  }

  .cert-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-size: 0.82rem;
    padding: 0.35rem 0;
    border-bottom: 1px solid var(--border);
    gap: 0.5rem;
  }
  .cert-row:last-child { border-bottom: none; }
  .cert-label { color: var(--text-dim); flex-shrink: 0; }
  .cert-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    text-align: right;
    word-break: break-all;
  }

  /* Protocoles */
  .proto-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .proto-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.83rem;
  }
  .proto-name { font-family: 'JetBrains Mono', monospace; }
  .badge {
    font-size: 0.68rem;
    font-weight: 600;
    padding: 0.15rem 0.55rem;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  .badge-ok    { background: rgba(16,185,129,0.15); color: #10b981; }
  .badge-warn  { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-bad   { background: rgba(239,68,68,0.15); color: #ef4444; }
  .badge-off   { background: rgba(100,116,139,0.12); color: #64748b; }

  /* Vulnérabilités */
  .vuln-item {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
  }
  .vuln-item:last-child { border-bottom: none; }
  .vuln-icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }
  .vuln-name { font-weight: 500; }
  .vuln-desc { font-size: 0.76rem; color: var(--text-dim); margin-top: 0.15rem; }
  .sev-critical { color: #ef4444; }
  .sev-high     { color: #f97316; }
  .sev-medium   { color: #f59e0b; }
  .sev-low      { color: #06b6d4; }
  .sev-info     { color: #64748b; }
  .sev-ok       { color: #10b981; }

  /* Cipher suites */
  .cipher-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.3rem 0;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid rgba(30,45,77,0.5);
  }
  .cipher-item:last-child { border-bottom: none; }
  .cipher-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .cipher-name { flex: 1; }
  .cipher-bits { color: var(--text-dim); font-size: 0.72rem; }

  /* Warnings & Errors */
  .alert-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .alert-item {
    font-size: 0.8rem;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    border-left: 3px solid;
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .alert-error { background: rgba(239,68,68,0.08); border-color: #ef4444; color: #fca5a5; }
  .alert-warn  { background: rgba(245,158,11,0.08); border-color: #f59e0b; color: #fcd34d; }

  /* Historique */
  .history-section { margin-top: 2rem; }
  .history-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
  }
  .history-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .history-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.7rem;
    font-size: 0.78rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: border-color 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }
  .history-chip:hover { border-color: var(--accent); }
  .history-chip .h-grade {
    font-weight: 700;
    font-size: 0.7rem;
  }

  #error-banner {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 0.9rem 1.25rem;
    color: #fca5a5;
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }

  .full-card { grid-column: 1 / -1; }

  @media (max-width: 600px) {
    .input-row { flex-wrap: wrap; }
    .grade-banner { flex-direction: column; gap: 1rem; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SSL<span>scan</span></div>
  <div class="tagline">Analyse SSL/TLS • Certificats • Vulnérabilités</div>
</header>

<main>
  <div class="scan-box">
    <h1>Analyser un domaine SSL/TLS</h1>
    <p>Vérifiez la configuration SSL, les protocoles, les certificats et les vulnérabilités connues.</p>
    <div class="input-row">
      <input id="host-input" class="input-host" type="text"
             placeholder="example.com  ou  192.168.1.1" autocomplete="off" spellcheck="false">
      <input id="port-input" class="input-port" type="number" value="443" min="1" max="65535">
      <button id="scan-btn" class="btn-scan" onclick="startScan()">Analyser</button>
    </div>
    <div class="progress-container" id="progress-container">
      <div class="progress-label" id="progress-label">Connexion...</div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
    </div>
  </div>

  <div id="error-banner"></div>
  <div id="results"></div>

  <div class="history-section" id="history-section" style="display:none">
    <div class="history-title">Scans récents</div>
    <div class="history-grid" id="history-grid"></div>
  </div>
</main>

<script>
let scanning = false;

async function startScan() {
  if (scanning) return;
  const host = document.getElementById('host-input').value.trim();
  const port = parseInt(document.getElementById('port-input').value) || 443;
  if (!host) { showError("Veuillez saisir un nom d'hôte."); return; }

  hideError();
  document.getElementById('results').style.display = 'none';
  scanning = true;
  document.getElementById('scan-btn').disabled = true;

  const steps = [
    [10, "Résolution DNS..."],
    [25, "Connexion SSL/TLS..."],
    [45, "Lecture du certificat..."],
    [60, "Test des protocoles..."],
    [75, "Énumération des ciphers..."],
    [88, "Vérification des vulnérabilités..."],
    [95, "Calcul du score..."],
  ];

  const prog = document.getElementById('progress-container');
  const bar  = document.getElementById('progress-bar');
  const lbl  = document.getElementById('progress-label');
  prog.style.display = 'block';
  bar.style.width = '0%';

  let stepIndex = 0;
  const interval = setInterval(() => {
    if (stepIndex < steps.length) {
      bar.style.width = steps[stepIndex][0] + '%';
      lbl.textContent = steps[stepIndex][1];
      stepIndex++;
    }
  }, 800);

  try {
    const resp = await fetch('/api/scan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ host, port, check_protocols: true, check_headers: true })
    });
    clearInterval(interval);
    bar.style.width = '100%';
    lbl.textContent = 'Analyse terminée ✓';

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || 'Erreur serveur');
    }
    const data = await resp.json();
    setTimeout(() => {
      prog.style.display = 'none';
      renderResults(data);
      loadHistory();
    }, 400);
  } catch(e) {
    clearInterval(interval);
    prog.style.display = 'none';
    showError(e.message || 'Erreur lors du scan.');
  } finally {
    scanning = false;
    document.getElementById('scan-btn').disabled = false;
  }
}

function showError(msg) {
  const b = document.getElementById('error-banner');
  b.textContent = '✖ ' + esc(msg);
  b.style.display = 'block';
}
function hideError() {
  document.getElementById('error-banner').style.display = 'none';
}

function gradeClass(g) {
  const m = {'A+':'A-plus','A':'A','B':'B','C':'C','D':'D','E':'E','F':'F'};
  return 'grade-' + (m[g] || 'NA');
}

function scoreColor(s) {
  if (s >= 85) return '#10b981';
  if (s >= 65) return '#06b6d4';
  if (s >= 50) return '#f59e0b';
  if (s >= 30) return '#f97316';
  return '#ef4444';
}

function renderResults(d) {
  const el = document.getElementById('results');
  el.style.display = 'block';
  const g = d.grade || 'N/A';
  const sc = d.score || 0;

  let html = `
  <div class="grade-banner">
    <div class="grade-circle ${gradeClass(g)}">${esc(g)}</div>
    <div class="grade-info">
      <h2>${esc(d.host)}:${d.port}</h2>
      <div class="grade-meta">
        <span>🌐 ${esc(d.ip_address)}</span>
        <span>⏱ ${esc(String(d.duration_ms))} ms</span>
        <span>🕒 ${esc(d.scan_time)}</span>
        <span>Score: <strong>${sc}/100</strong></span>
      </div>
      <div class="score-bar-track">
        <div class="score-bar-fill" id="score-anim" style="width:0%;background:${scoreColor(sc)}"></div>
      </div>
    </div>
  </div>`;

  // Alertes
  if (d.errors && d.errors.length) {
    html += `<div class="card" style="margin-bottom:1rem"><div class="card-title">Erreurs</div><div class="alert-list">`;
    for (const e of d.errors) html += `<div class="alert-item alert-error">✖ ${esc(e)}</div>`;
    html += `</div></div>`;
  }
  if (d.warnings && d.warnings.length) {
    html += `<div class="card" style="margin-bottom:1rem"><div class="card-title">Avertissements</div><div class="alert-list">`;
    for (const w of d.warnings) html += `<div class="alert-item alert-warn">⚠ ${esc(w)}</div>`;
    html += `</div></div>`;
  }

  html += `<div class="cards-grid">`;

  // Certificat
  if (d.certificate) {
    const c = d.certificate;
    const exp = c.is_expired
      ? `<span style="color:#ef4444">${esc(c.not_after)} (EXPIRÉ)</span>`
      : c.days_until_expiry < 30
        ? `<span style="color:#f59e0b">${esc(c.not_after)} (${c.days_until_expiry}j)</span>`
        : `<span style="color:#10b981">${esc(c.not_after)} (${c.days_until_expiry}j)</span>`;

    const san = c.san && c.san.length ? c.san.slice(0,4).map(s => esc(s)).join(', ') + (c.san.length>4?` +${c.san.length-4}`:'') : '—';

    html += `
    <div class="card">
      <div class="card-title">Certificat</div>
      <div class="cert-row"><span class="cert-label">Sujet (CN)</span><span class="cert-value">${esc(c.subject.CN||'N/A')}</span></div>
      <div class="cert-row"><span class="cert-label">Émetteur</span><span class="cert-value">${esc(c.issuer.O||c.issuer.CN||'N/A')}</span></div>
      <div class="cert-row"><span class="cert-label">Algorithme</span><span class="cert-value">${esc(c.signature_algorithm)}</span></div>
      <div class="cert-row"><span class="cert-label">Version</span><span class="cert-value">v${c.version}</span></div>
      <div class="cert-row"><span class="cert-label">Valide jusqu'au</span><span class="cert-value">${exp}</span></div>
      <div class="cert-row"><span class="cert-label">Auto-signé</span><span class="cert-value" style="color:${c.is_self_signed?'#ef4444':'#10b981'}">${c.is_self_signed?'OUI':'non'}</span></div>
      <div class="cert-row"><span class="cert-label">SAN</span><span class="cert-value" style="font-size:0.7rem">${san}</span></div>
      <div class="cert-row"><span class="cert-label">SHA-256</span><span class="cert-value" style="font-size:0.62rem;color:#64748b">${esc(c.fingerprint_sha256.substring(0,29))}…</span></div>
    </div>`;
  }

  // Protocoles
  if (d.protocol_support) {
    const p = d.protocol_support;
    const protos = [
      {name:'TLS 1.3', ok:p.tls13,  dangerous:false},
      {name:'TLS 1.2', ok:p.tls12,  dangerous:false},
      {name:'TLS 1.1', ok:p.tls11,  dangerous:true},
      {name:'TLS 1.0', ok:p.tls10,  dangerous:true},
      {name:'SSLv3',   ok:p.ssl3,   dangerous:true},
      {name:'SSLv2',   ok:p.ssl2,   dangerous:true},
    ];
    html += `<div class="card"><div class="card-title">Protocoles</div><div class="proto-list">`;
    for (const proto of protos) {
      let badge, badgeClass;
      if (proto.ok && !proto.dangerous) {
        badge = '✔ Supporté'; badgeClass = 'badge-ok';
      } else if (proto.ok && proto.dangerous) {
        badge = '⚠ Actif'; badgeClass = 'badge-bad';
      } else if (!proto.ok && proto.dangerous) {
        badge = '✔ Inactif'; badgeClass = 'badge-ok';
      } else {
        badge = '✖ Non supporté'; badgeClass = 'badge-off';
      }
      html += `<div class="proto-item"><span class="proto-name">${esc(proto.name)}</span><span class="badge ${badgeClass}">${badge}</span></div>`;
    }
    html += `</div></div>`;
  }

  // HSTS
  if (d.security_headers) {
    const h = d.security_headers;
    html += `<div class="card"><div class="card-title">Sécurité HTTP</div>`;
    if (h.hsts) {
      const ageOk = h.hsts_max_age && h.hsts_max_age >= 31536000;
      html += `
      <div class="cert-row"><span class="cert-label">HSTS</span><span class="cert-value" style="color:#10b981">✔ Activé</span></div>
      <div class="cert-row"><span class="cert-label">max-age</span><span class="cert-value" style="color:${ageOk?'#10b981':'#f59e0b'}">${h.hsts_max_age ? h.hsts_max_age + 's' : '?'}</span></div>
      <div class="cert-row"><span class="cert-label">includeSubDomains</span><span class="cert-value" style="color:${h.hsts_include_subdomains?'#10b981':'#64748b'}">${h.hsts_include_subdomains?'✔ oui':'✖ non'}</span></div>
      <div class="cert-row"><span class="cert-label">preload</span><span class="cert-value" style="color:${h.hsts_preload?'#10b981':'#64748b'}">${h.hsts_preload?'✔ oui':'✖ non'}</span></div>`;
    } else {
      html += `<div class="cert-row"><span class="cert-label">HSTS</span><span class="cert-value" style="color:#ef4444">✖ Absent</span></div>
      <div style="font-size:0.75rem;color:#64748b;margin-top:0.5rem">Strict-Transport-Security non configuré — risque de downgrade HTTP.</div>`;
    }
    html += `</div>`;
  }

  html += `</div>`; // fin cards-grid

  // Vulnérabilités (pleine largeur)
  if (d.vulnerabilities && d.vulnerabilities.length) {
    const sevOrder = {critical:0,high:1,medium:2,low:3,info:4};
    const sorted = [...d.vulnerabilities].sort((a,b) => {
      if (a.vulnerable !== b.vulnerable) return b.vulnerable - a.vulnerable;
      return (sevOrder[a.severity]||9) - (sevOrder[b.severity]||9);
    });
    html += `<div class="card" style="margin-top:1rem"><div class="card-title">Vulnérabilités &amp; Contrôles</div>`;
    for (const v of sorted) {
      const sevClass = v.vulnerable ? `sev-${v.severity}` : 'sev-ok';
      const icon = v.vulnerable ? (v.severity==='critical'||v.severity==='high' ? '✖' : '⚠') : '✔';
      html += `
      <div class="vuln-item">
        <span class="vuln-icon ${sevClass}">${icon}</span>
        <div>
          <div class="vuln-name ${v.vulnerable?sevClass:'sev-ok'}">${esc(v.name)}
            <span style="font-size:0.68rem;font-weight:400;opacity:0.7;margin-left:0.4rem">[${v.severity}]</span>
          </div>
          ${v.vulnerable ? `<div class="vuln-desc">${esc(v.description)}</div>` : ''}
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  // Cipher suites
  if (d.cipher_suites && d.cipher_suites.length) {
    const strengthColors = {strong:'#10b981',acceptable:'#06b6d4',weak:'#f59e0b',insecure:'#ef4444'};
    html += `<div class="card" style="margin-top:1rem"><div class="card-title">Cipher Suites</div>`;
    for (const cs of d.cipher_suites.slice(0,15)) {
      const col = strengthColors[cs.strength] || '#64748b';
      html += `
      <div class="cipher-item">
        <span class="cipher-dot" style="background:${col}"></span>
        <span class="cipher-name">${esc(cs.name)}</span>
        <span style="color:#64748b;font-size:0.7rem">${esc(cs.protocol)}</span>
        <span class="cipher-bits">${cs.bits}b</span>
        <span class="badge" style="background:${col}22;color:${col};font-size:0.65rem">${cs.strength}</span>
      </div>`;
    }
    html += `</div>`;
  }

  el.innerHTML = html;

  // Animation barre de score
  requestAnimationFrame(() => {
    setTimeout(() => {
      const bar = document.getElementById('score-anim');
      if (bar) bar.style.width = sc + '%';
    }, 100);
  });
}

function esc(str) {
  if (str === undefined || str === null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function loadHistory() {
  try {
    const resp = await fetch('/api/history');
    const data = await resp.json();
    if (!data.length) return;
    const sec = document.getElementById('history-section');
    const grid = document.getElementById('history-grid');
    const gradeColorMap = {'A+':'#10b981','A':'#10b981','B':'#06b6d4','C':'#f59e0b','D':'#f97316','E':'#ef4444','F':'#ef4444'};
    grid.innerHTML = data.map(item => {
      const col = gradeColorMap[item.grade] || '#64748b';
      return `<div class="history-chip" onclick="quickScan('${esc(item.host)}')">
        <span class="h-grade" style="color:${col}">${esc(item.grade)}</span>
        <span>${esc(item.host)}:${item.port}</span>
      </div>`;
    }).join('');
    sec.style.display = 'block';
  } catch(e) {}
}

function quickScan(host) {
  document.getElementById('host-input').value = host;
  startScan();
}

// Entrée clavier
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('host-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') startScan();
  });
  loadHistory();
});
</script>
</body>
